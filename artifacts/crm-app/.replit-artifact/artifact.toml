kind = "web"
previewPath = "/"
title = "CRM App"
version = "1.0.0"
id = "artifacts/crm-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19386

[services.development]
run = "pnpm --filter @workspace/crm-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crm-app", "run", "build" ]
publicDir = "artifacts/crm-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19386"
BASE_PATH = "/"
